name: release

# Tag-gated prebuilt-binary release (SKELETON, mirrors spec-spine's release.yml).
# Pushing a `v*` tag builds a per-triple archive (with a .sha256 sidecar) for
# each of the five supported targets, attaches them to the GitHub Release,
# publishes the crates to crates.io, and assembles + publishes the npm platform
# packages and the PyPI wheels/sdist from the SAME archives (no second Rust build).
#
# tenant-tail vends crates + npm + PyPI, mirroring spec-spine's three publish
# legs. publish-crates, publish-npm, and publish-pypi are idempotent: each skips
# any version already live (crates.io / npm / PyPI), so re-running a tag is safe.
# publish-npm is gated on NPM_TOKEN and publish-pypi on the
# vars.PYPI_TRUSTED_PUBLISHING repo variable (clean skip if unset); absent the
# one-time setup each is a clean no-op. Each archive ships a per-target CycloneDX
# SBOM and a SLSA build-provenance attestation.
#
# This is FR-004 of OAP spec 219 (the one genuinely net-new infrastructure leg).
# Validate action versions and the build matrix before the first real release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build · ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc_floor: true selects the cargo-zigbuild path below, which
          # cross-links against glibc 2.17 so the manylinux_2_17 wheel tag
          # (py/src/tenant_tail/platform_map.py) is honest. A plain `cargo
          # build` on these runners links against their host glibc (2.39 on
          # ubuntu-latest at authoring time), which is newer than 2.17 and
          # would silently break older-glibc hosts despite the tag's promise.
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu,  glibc_floor: true }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu, glibc_floor: true }
          # x86_64-apple-darwin cross-compiles on the Apple Silicon runner.
          - { os: macos-latest,     triple: x86_64-apple-darwin,  glibc_floor: false }
          - { os: macos-latest,     triple: aarch64-apple-darwin, glibc_floor: false }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc, glibc_floor: false }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Add target (no-op if native)
        run: rustup target add ${{ matrix.triple }}

      # --- Linux only: build against a pinned glibc floor (D1) -------------
      # TODO(D1, unvalidated at authoring time): exercise this on the next
      # tagged release and confirm the resulting binary actually runs on a
      # glibc-2.17-era host (e.g. a manylinux2014/CentOS 7 container) before
      # trusting the manylinux_2_17 wheel tag on the strength of this alone.
      #
      # cargo-zigbuild auto-detects a `pip`-installed `ziglang` package (it
      # shells out to `python3 -m ziglang` before falling back to a `zig`
      # binary on PATH), so no separate Zig download/action is needed here.
      - name: Install zig + cargo-zigbuild (glibc-floor builds only)
        if: matrix.glibc_floor
        run: |
          set -euo pipefail
          python3 -m pip install --user ziglang
          cargo install cargo-zigbuild --locked
      - name: Build release binary (glibc <= 2.17)
        if: matrix.glibc_floor
        run: cargo zigbuild --release --locked --target ${{ matrix.triple }}.2.17 -p tenant-tail-cli
      # --- Everything else: the toolchain's default (host) glibc / target --
      - name: Build release binary
        if: ${{ !matrix.glibc_floor }}
        run: cargo build --release --locked --bin tenant-tail --target ${{ matrix.triple }}

      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          mkdir -p staging
          cp "target/${{ matrix.triple }}/release/tenant-tail${EXT}" staging/
          cp LICENSE README.md staging/
          # Defensive validation before GITHUB_REF_NAME (the pushed tag name)
          # is embedded into a filename and written to $GITHUB_ENV: refuse
          # anything that does not look like a release tag, rather than
          # silently building an oddly-named (or crafted) archive from it.
          case "${GITHUB_REF_NAME}" in
            v[0-9]*) ;;
            *)
              echo "::error::unexpected tag name '${GITHUB_REF_NAME}' (expected to match ^v[0-9]); refusing to stage a release archive" >&2
              exit 2
              ;;
          esac
          echo "ARCHIVE_BASE=tenant-tail-${GITHUB_REF_NAME}-${{ matrix.triple }}" >> "$GITHUB_ENV"

      - name: Package (tar.gz + sha256) for Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -C staging -czf "${ARCHIVE_BASE}.tar.gz" .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          fi
          cat "${ARCHIVE_BASE}.tar.gz.sha256"
          echo "ARCHIVE_FILE=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip + sha256) for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = $env:ARCHIVE_BASE
          Compress-Archive -Path staging/* -DestinationPath "$base.zip" -Force
          $hash = (Get-FileHash "$base.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $base.zip" | Out-File -Encoding ascii -NoNewline "$base.zip.sha256"
          Get-Content "$base.zip.sha256"
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_FILE=$base.zip"

      # --- Supply-chain artifacts: per-target CycloneDX SBOM + provenance ---
      - name: Generate per-target CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ env.ARCHIVE_BASE }}.cdx.json
          upload-artifact: false
      - name: Fail closed if the SBOM has no components
        shell: bash
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));const n=(d.components||[]).length;console.log('SBOM components:',n);if(n===0){console.error('refusing to ship an SBOM with zero components');process.exit(1);}" "${ARCHIVE_BASE}.cdx.json"
      - name: Attest build provenance for the archive
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ env.ARCHIVE_FILE }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archive-${{ matrix.triple }}
          path: |
            tenant-tail-*.tar.gz
            tenant-tail-*.tar.gz.sha256
            tenant-tail-*.zip
            tenant-tail-*.zip.sha256
            tenant-tail-*.cdx.json
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true
      - name: List release assets
        run: ls -la dist
      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Publish types, core, cli (tolerate versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          for crate in tenant-tail-types tenant-tail-core tenant-tail-cli; do
            echo "::group::publish $crate"
            if out="$(cargo publish -p "$crate" --locked 2>&1)"; then
              echo "$out"; echo ">> published $crate"
            else
              echo "$out"
              if echo "$out" | grep -qiE "already (uploaded|exists)"; then
                echo ">> $crate version already on crates.io, skipping"
              else
                echo ">> publish failed for $crate"; exit 1
              fi
            fi
            echo "::endgroup::"
          done

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for NPM_TOKEN
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=npm publish skipped::NPM_TOKEN secret not set; skipping npm publish"
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.gate.outputs.present == 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        if: steps.gate.outputs.present == 'true'
        with:
          path: dist/archives
          pattern: archive-*
          merge-multiple: true

      - name: Assemble platform packages from the release archives
        if: steps.gate.outputs.present == 'true'
        working-directory: npm
        run: |
          set -euo pipefail
          cp ../LICENSE LICENSE
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/generate-platform-packages.js \
            --version "$VERSION" --archives ../dist/archives --out dist/packages --write-main
          ls -la dist/packages/@tenant-tail

      - name: Publish (idempotent; skip versions already on npm)
        if: steps.gate.outputs.present == 'true'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          publish_if_absent() {
            local dir="$1" name version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"
            echo "::group::publish ${name}@${version}"
            # Guarded: npm view exits non-zero for the common "not yet
            # published" case, so this check must not trip `set -e`.
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo ">> ${name}@${version} already on npm, skipping"
              echo "::endgroup::"
              return 0
            fi
            # Check npm publish's own return code explicitly (mirrors the
            # publish-crates step's exit-on-failure pattern) rather than
            # letting a trailing echo reset $? and mask a failed publish.
            if npm publish "${dir}" --access public; then
              echo ">> published ${name}@${version}"
            else
              echo ">> publish failed for ${name}@${version}"
              echo "::endgroup::"
              return 1
            fi
            echo "::endgroup::"
          }
          # Platform packages first, then the main package, so there is never a
          # window where `tenant-tail` is live without its binaries. A failed
          # publish_if_absent call is a plain simple command here (not guarded
          # by if/&&), so `set -e` propagates its failure straight out of the
          # loop and fails the step; it no longer stays green on a masked error.
          for d in dist/packages/@tenant-tail/*; do
            publish_if_absent "$d"
          done
          publish_if_absent "."

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Job-level permissions REPLACE the workflow-level default entirely, so
      # contents: read must be restated here or actions/checkout below has no
      # repo read scope at all.
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/tenant-tail
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Gate on the PYPI_TRUSTED_PUBLISHING repo variable (not a secret). Absent
      # or not "true" => a clean skip, never a red X, exactly like publish-npm's
      # NPM_TOKEN gate.
      - name: Check Trusted Publishing is enabled
        id: gate
        env:
          ENABLED: ${{ vars.PYPI_TRUSTED_PUBLISHING }}
        run: |
          if [ "${ENABLED:-false}" = "true" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=PyPI publish skipped::vars.PYPI_TRUSTED_PUBLISHING is not 'true'; skipping PyPI publish"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.gate.outputs.present == 'true'
        with:
          python-version: "3.12"

      - name: Install the build frontend
        if: steps.gate.outputs.present == 'true'
        run: python -m pip install --upgrade build

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        if: steps.gate.outputs.present == 'true'
        with:
          path: dist/archives
          pattern: archive-*
          merge-multiple: true

      - name: Assemble wheels + sdist from the release archives
        if: steps.gate.outputs.present == 'true'
        working-directory: py
        run: |
          set -euo pipefail
          cp ../LICENSE LICENSE                         # ship the license in the sdist + wheels
          VERSION="${GITHUB_REF_NAME#v}"                # tag v0.1.0 -> 0.1.0
          # generate_wheels.py verifies the tag matches the committed project
          # version and fails loudly on a mismatch, so the lock cannot drift
          # silently (parity with the npm generator's --write-main check).
          python scripts/generate_wheels.py \
            --version "$VERSION" --archives ../dist/archives --out dist/pypi --build-sdist
          ls -la dist/pypi

      - name: Publish to PyPI (idempotent; signed)
        if: steps.gate.outputs.present == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: py/dist/pypi
          skip-existing: true
          attestations: true
