name: determinism

# Cross-platform determinism GOLDEN for the committed governance artifacts.
#
# tenant-tail dogfoods spec-spine and COMMITS the derived artifacts (the sharded
# .derived/spec-registry/by-spec/ and .derived/codebase-index/by-spec/ +
# by-package/ trees) so the coupling gate and the `index check` staleness gate
# can compare committed against current. That only holds if regeneration is a
# pure function of (config, file contents): a contributor on macOS regenerates
# and commits, and CI on Linux re-derives and compares. This workflow PROVES that
# empirically: each leg runs the PINNED spec-spine over this repo's own corpus
# and publishes the digests; the gather job fails if any digest differs across
# platforms.
#
# The verify cores' own determinism (the recomputed certificate hash, the
# byte-deterministic provenance report) is covered by the parity tests in ci.yml's
# `test` job. This workflow covers the one thing those tests cannot: that the
# committed .derived/ artifacts are platform-independent.
#
# Coverage spans both CPU arches and three OSes: x86_64 (Linux + Windows) and
# aarch64 (Linux + macOS). x86_64-apple-darwin is intentionally omitted (its two
# dimensions are each already proven, and the Intel macOS runner queues badly);
# its binary is still built and shipped by release.yml.
#
# build-meta.json is excluded: it carries a wall-clock `builtAt`, the sole
# non-deterministic artifact (it is gitignored for the same reason).

# Driven by ci.yml as a reusable workflow so the single `ci-gate` check covers
# determinism too (and it runs on the merge queue through ci.yml's merge_group
# trigger). `workflow_dispatch` keeps it runnable on its own.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emit:
    name: emit · ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          - { os: macos-latest,     triple: aarch64-apple-darwin }
          - { os: windows-latest,   triple: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # Install the pinned spec-spine governing binary (sha512-locked, offline).
      - name: Install pinned governance toolchain
        run: npm ci
      - name: Compile + index this repo's own corpus
        shell: bash
        run: |
          set -euo pipefail
          npx --no-install spec-spine compile
          npx --no-install spec-spine index
      - name: Digest the deterministic artifacts
        shell: bash
        run: |
          set -euo pipefail
          # Portable sha256 across Linux (sha256sum) / macOS (shasum) / Windows git-bash.
          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | awk '{print $1}'
            elif command -v shasum    >/dev/null 2>&1; then shasum -a 256 "$1" | awk '{print $1}'
            else openssl dgst -sha256 "$1" | awk '{print $NF}'; fi
          }
          # spec-spine 0.5.0 shards the derived artifacts into per-spec / per-package
          # JSON files rather than one monolithic file. Digest the whole tree: hash
          # each shard, pair it with its repo-relative (forward-slash) path, sort for
          # order-stability, then hash that manifest into one digest. build-meta.json
          # is excluded (its wall-clock `builtAt` is the sole non-deterministic field).
          #
          # An EMPTY tree hashes to a fixed, byte-identical digest across every
          # triple just like a real tree would, so a regeneration that silently
          # produced zero shards (e.g. a compiler that ran but found nothing)
          # would vacuously pass the cross-triple comparison below. Refuse to
          # hash a manifest with zero entries; return non-zero (an assignment
          # command substitution, so `set -e` aborts the step) instead.
          digest_tree() {
            local root="$1" manifest count
            manifest="$(mktemp)"
            find "$root" -type f -name '*.json' ! -name 'build-meta.json' \
              | LC_ALL=C sort \
              | while IFS= read -r f; do echo "$(sha256 "$f")  $f"; done > "$manifest"
            count="$(wc -l < "$manifest" | tr -d ' ')"
            if [ "$count" -eq 0 ]; then
              echo "FAIL: $root produced an EMPTY shard tree (0 files); refusing to hash a vacuous manifest" >&2
              return 1
            fi
            sha256 "$manifest"
          }
          mkdir -p digests
          registry_digest="$(digest_tree .derived/spec-registry)"
          index_digest="$(digest_tree .derived/codebase-index)"
          {
            echo "${{ matrix.triple }} registry ${registry_digest}"
            echo "${{ matrix.triple }} index    ${index_digest}"
          } | tee "digests/${{ matrix.triple }}.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.triple }}
          path: digests/${{ matrix.triple }}.txt
          if-no-files-found: error

  gather:
    name: assert byte-identical across all triples
    needs: emit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - name: Compare digests
        run: |
          set -euo pipefail
          echo "=== per-triple digests ==="
          cat digests/*.txt | sort
          fail=0
          for kind in registry index; do
            n=$(awk -v k="$kind" '$2==k {print $3}' digests/*.txt | sort -u | wc -l | tr -d ' ')
            count=$(awk -v k="$kind" '$2==k {print $3}' digests/*.txt | wc -l | tr -d ' ')
            if [ "$count" -lt 4 ]; then
              echo "FAIL: $kind reported by only $count/4 triples (a leg failed to emit)"; fail=1
            elif [ "$n" -ne 1 ]; then
              echo "FAIL: $kind shard tree differs across triples ($n distinct digests)"; fail=1
            else
              echo "OK:   $kind shard tree is byte-identical across all $count triples"
            fi
          done
          exit $fail
