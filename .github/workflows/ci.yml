name: CI

# Build + test + lint, then self-governance: run the pinned spec-spine's
# governance gates against THIS repo's own corpus (the dogfood pattern). A
# verify-only toolkit that is not itself spec-governed would be hypocritical.
#
# The single required status check is `ci-gate` (see the job at the bottom): it
# aggregates every job, so branch protection and the merge queue require just
# that one name instead of an enumerated, drift-prone list.

on:
  push:
    branches: [main]
  pull_request:
  # GitHub merge queue. Each queued PR is tested against the speculative merged
  # tree, so a green PR cannot be silently invalidated by the one ahead of it.
  # The coupling gate stays pull_request-only (it reads the PR-body waiver, which
  # merge_group does not carry); every other check runs here. INERT until a repo
  # admin enables the merge queue in branch protection.
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # rust-toolchain.toml pins the exact channel (+ rustfmt, clippy).
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Format
        run: cargo fmt --all --check

  self_governance:
    name: self-governance (compile · index · lint · couple)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the coupling gate can diff the PR base SHA against
          # HEAD; the default shallow clone (fetch-depth 1) leaves the base
          # commit absent and `git diff base...HEAD` fails.
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # Root package.json pins spec-spine as a devDependency; npm ci installs it
      # from the committed package-lock.json (sha512-locked, offline-capable).
      - name: Install pinned governance toolchain
        run: npm ci
      - name: Compile registry (validation gate)
        run: npx --no-install spec-spine compile
      - name: Codebase index freshness (committed artifacts must be current)
        run: npx --no-install spec-spine index check
      - name: Conformance lint (fail on warn)
        run: npx --no-install spec-spine lint --fail-on-warn
      # The coupling gate is a PR-time gate: it joins the spec and code views and
      # refuses the *merge* when code drifts from its owning spec. It runs on
      # pull_request only. A push to main has already merged (nothing left to
      # refuse) and carries no PR body, so the Spec-Drift-Waiver line (which lives
      # in the PR description, not the squash commit) is unrecoverable there.
      - name: Coupling gate (spec/code drift)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          echo "coupling base: $BASE -> HEAD"
          printf '%s' "${PR_BODY:-}" > /tmp/pr-body.txt
          npx --no-install spec-spine couple --base "$BASE" --head HEAD --pr-body /tmp/pr-body.txt

  # Cross-platform determinism golden for the committed governance artifacts, run
  # as a reusable workflow so the single `ci-gate` check below covers it too.
  determinism:
    name: determinism
    uses: ./.github/workflows/determinism.yml

  # AI PR review folded into the gate (OAP spec 177 + 085 precedent). PR-only:
  # it needs PR context (number, base/head diff), so it is skipped on
  # push/merge_group/workflow_dispatch, which ci-gate treats as success.
  # Job-level pull-requests: write overrides the workflow read default (the
  # review posts a comment); only the one secret the reusable workflow actually
  # consumes (CLAUDE_CODE_OAUTH_TOKEN) is forwarded, not the full repo secret
  # set (least privilege; `secrets: inherit` would leak every other secret into
  # this job's context). A Claude API outage passes with a visible notice
  # (spec 177 resilience); an auth failure or unset secret still hard-fails.
  ai-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    uses: ./.github/workflows/ai-pr-review.yml

  # The single required status check for branch protection and the merge queue.
  # It aggregates every CI job, so branch protection requires just this one name
  # instead of an enumerated, drift-prone list. A skipped job (e.g. a future
  # event-gated one) counts as a pass; a failed or cancelled job fails the gate.
  ci-gate:
    name: ci-gate
    if: ${{ always() }}
    needs: [test, self_governance, determinism, ai-review]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled:"
          echo "  test=${{ needs.test.result }}  self_governance=${{ needs.self_governance.result }}  determinism=${{ needs.determinism.result }}  ai-review=${{ needs.ai-review.result }}"
          exit 1
      - name: All required CI jobs passed
        run: |
          echo "ci-gate passed: test, self_governance, determinism, and ai-review are all green or skipped"
